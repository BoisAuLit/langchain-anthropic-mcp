<svg viewBox="0 0 1200 970" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.45"/>
    </filter>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="970" fill="#0a0a12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#f1f5f9">🛠️ Deep Agent 手写版架构图</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">main agent · 4 类工具 · research-agent (subagent)</text>

  <!-- User Query -->
  <g transform="translate(440,100)">
    <rect width="320" height="60" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="160" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#f1f5f9">🧑 用户提问</text>
    <text x="160" y="50" text-anchor="middle" font-size="12" fill="#cbd5e1" font-style="italic">"Give me an overview of MCP."</text>
  </g>
  <line x1="600" y1="165" x2="600" y2="205" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrAmber)"/>

  <!-- Main Agent -->
  <g transform="translate(260,215)">
    <rect width="680" height="125" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="340" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#fbbf24">🎯 Main Agent (Orchestrator)</text>
    <text x="340" y="62" text-anchor="middle" font-size="13" fill="#e2e8f0">system_prompt = TODO_USAGE + FILE_USAGE + SUBAGENT_INSTRUCTIONS</text>
    <text x="340" y="84" text-anchor="middle" font-size="13" fill="#e2e8f0">state_schema = DeepAgentState { messages, todos, files }</text>
    <text x="340" y="108" text-anchor="middle" font-size="12" fill="#94a3b8" font-style="italic">create_agent(model, all_tools, system_prompt, state_schema)</text>
  </g>

  <!-- Fan-out arrows from main agent bottom to each tool top -->
  <line x1="380" y1="340" x2="270" y2="420" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="500" y1="340" x2="490" y2="420" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="700" y1="340" x2="710" y2="420" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="820" y1="340" x2="930" y2="420" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrRed)"/>

  <!-- Tool 1: TODO -->
  <g transform="translate(170, 430)">
    <rect width="200" height="130" rx="8" fill="#2a2418" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#f9a8d4">📋 TODO 工具</text>
    <text x="100" y="58" text-anchor="middle" font-size="12" fill="#fde68a">write_todos(...)</text>
    <text x="100" y="76" text-anchor="middle" font-size="12" fill="#fde68a">read_todos()</text>
    <text x="100" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">治忘</text>
  </g>

  <!-- Tool 2: Files -->
  <g transform="translate(390, 430)">
    <rect width="200" height="130" rx="8" fill="#0f2729" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">📁 Files 工具</text>
    <text x="100" y="56" text-anchor="middle" font-size="12" fill="#a5f3fc">write_file / read_file</text>
    <text x="100" y="74" text-anchor="middle" font-size="12" fill="#a5f3fc">edit_file / ls</text>
    <text x="100" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#22d3ee">治挤</text>
  </g>

  <!-- Tool 3: think_tool -->
  <g transform="translate(610, 430)">
    <rect width="200" height="130" rx="8" fill="#2d2418" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#67e8f9">💭 think_tool</text>
    <text x="100" y="58" text-anchor="middle" font-size="12" fill="#fed7aa">self-prompt</text>
    <text x="100" y="76" text-anchor="middle" font-size="12" fill="#fed7aa">recitation(复述)</text>
    <text x="100" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#fb923c">复述</text>
  </g>

  <!-- Tool 4: task -->
  <g transform="translate(830, 430)">
    <rect width="200" height="130" rx="8" fill="#2d1f1f" stroke="#f87171" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#fde047">🚀 task 工具</text>
    <text x="100" y="58" text-anchor="middle" font-size="12" fill="#fca5a5">delegate(</text>
    <text x="100" y="76" text-anchor="middle" font-size="12" fill="#fca5a5">  subagent_type, description)</text>
    <text x="100" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#f87171">治乱</text>
  </g>

  <!-- Arrow from task to research-agent -->
  <line x1="930" y1="560" x2="800" y2="640" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrRed)" stroke-dasharray="6,3"/>
  <text x="945" y="605" font-size="13" fill="#fca5a5" font-style="italic" font-weight="600">spawn</text>

  <!-- research-agent box -->
  <g transform="translate(310, 650)">
    <rect width="580" height="170" rx="10" fill="url(#subGrad)" filter="url(#shadow)" opacity="0.95"/>
    <text x="290" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#fde047">🧑‍🔬 research-agent (subagent)</text>
    <text x="290" y="64" text-anchor="middle" font-size="13" fill="#f1f5f9">隔离 context · state["messages"] = [{description}]</text>
    <text x="290" y="86" text-anchor="middle" font-size="13" fill="#f1f5f9">看不见父 agent 对话历史 · 独立 ReAct 循环</text>
    <text x="290" y="114" text-anchor="middle" font-size="13" fill="#cbd5e1">工具:tavily_search · think_tool</text>
    <text x="290" y="144" text-anchor="middle" font-size="12" fill="#a7f3d0" font-style="italic">完成后只回传一段总结 → 作为 ToolMessage</text>
  </g>

  <!-- Return arrow from research-agent back to main agent (curved on left side) -->
  <path d="M 310,735 C 100,735 100,277 260,277" stroke="#4ade80" stroke-width="2.2" marker-end="url(#arrGreen)" stroke-dasharray="6,3" fill="none"/>
  <text x="60" y="510" font-size="13" fill="#86efac" font-weight="600" transform="rotate(-90 60,510)">📨 返回结果</text>

  <!-- Legend -->
  <g transform="translate(40, 850)">
    <rect width="1120" height="105" rx="6" fill="#14141c" stroke="#475569" stroke-width="1"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#fbbf24">📖 图例 · 三件套对应三病</text>

    <g transform="translate(20, 48)">
      <circle cx="6" cy="6" r="6" fill="#fbbf24"/>
      <text x="22" y="10" font-size="12" fill="#fde68a"><tspan font-weight="700">治忘</tspan> = TODO 工具 — 规划丢失时用写下来 + 复读拉回主线</text>
    </g>
    <g transform="translate(20, 76)">
      <circle cx="6" cy="6" r="6" fill="#22d3ee"/>
      <text x="22" y="10" font-size="12" fill="#a5f3fc"><tspan font-weight="700">治挤</tspan> = Files 工具 — 长内容落盘,腾出 context</text>
    </g>
    <g transform="translate(440, 48)">
      <circle cx="6" cy="6" r="6" fill="#f87171"/>
      <text x="22" y="10" font-size="12" fill="#fca5a5"><tspan font-weight="700">治乱</tspan> = task 工具 — 子 agent 隔离 context,主线不被污染</text>
    </g>
    <g transform="translate(440, 76)">
      <circle cx="6" cy="6" r="6" fill="#fb923c"/>
      <text x="22" y="10" font-size="12" fill="#fed7aa"><tspan font-weight="700">复述</tspan> = think_tool — self-prompt 反思,拉回注意力</text>
    </g>
    <g transform="translate(840, 48)">
      <line x1="0" y1="6" x2="22" y2="6" stroke="#4ade80" stroke-width="2.2" stroke-dasharray="6,3"/>
      <text x="30" y="10" font-size="12" fill="#bbf7d0"><tspan font-weight="700">绿色虚线</tspan> = 子 agent 回传</text>
    </g>
    <g transform="translate(840, 76)">
      <line x1="0" y1="6" x2="22" y2="6" stroke="#f87171" stroke-width="2.5" stroke-dasharray="6,3"/>
      <text x="30" y="10" font-size="12" fill="#fca5a5"><tspan font-weight="700">红色虚线</tspan> = 派单 / spawn</text>
    </g>
  </g>
</svg>
