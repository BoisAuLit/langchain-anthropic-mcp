<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="badGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d1f1f"/>
      <stop offset="100%" stop-color="#1a1010"/>
    </linearGradient>
    <linearGradient id="goodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.45"/>
    </filter>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#0a0a12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#f1f5f9">📁 Context Offloading — 治挤</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">Lesson 2:把长内容落盘进 state.files,context 里只留文件名</text>

  <!-- Divider line -->
  <line x1="600" y1="100" x2="600" y2="700" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== LEFT: WITHOUT files ===== -->
  <g transform="translate(40,100)">
    <rect width="540" height="60" rx="8" fill="url(#badGrad)" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#fde047">❌ 没有 Files —— context 直接爆炸</text>
    <text x="270" y="48" text-anchor="middle" font-size="11" fill="#fca5a5" font-style="italic">所有工具结果直接堆进 messages</text>
  </g>

  <!-- Messages bloated -->
  <g transform="translate(40,180)">
    <text x="20" y="0" font-size="12" font-weight="700" fill="#fbbf24">📦 state["messages"]</text>
  </g>

  <g transform="translate(40,195)">
    <rect width="540" height="44" rx="4" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#f1f5f9">🧑 HumanMessage</text>
    <text x="14" y="34" font-size="11" fill="#cbd5e1">"研究 MCP 协议,给我一份综述"</text>
  </g>

  <g transform="translate(40,245)">
    <rect width="540" height="62" rx="4" fill="#2a2418" stroke="#fbbf24" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#f9a8d4">🔧 ToolMessage: tavily_search()</text>
    <text x="14" y="34" font-size="11" fill="#fde68a">"MCP is an open-source protocol... [4800 字]</text>
    <text x="14" y="50" font-size="11" fill="#fca5a5" font-style="italic">⚠️ 全部塞进 context</text>
  </g>

  <g transform="translate(40,313)">
    <rect width="540" height="62" rx="4" fill="#2a2418" stroke="#fbbf24" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#f9a8d4">🔧 ToolMessage: tavily_search()</text>
    <text x="14" y="34" font-size="11" fill="#fde68a">"Anthropic launched MCP in 2024... [3200 字]</text>
    <text x="14" y="50" font-size="11" fill="#fca5a5" font-style="italic">⚠️ 又塞</text>
  </g>

  <g transform="translate(40,381)">
    <rect width="540" height="62" rx="4" fill="#2a2418" stroke="#fbbf24" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#f9a8d4">🔧 ToolMessage: tavily_search()</text>
    <text x="14" y="34" font-size="11" fill="#fde68a">"Use cases include... [5400 字]</text>
    <text x="14" y="50" font-size="11" fill="#fca5a5" font-style="italic">⚠️ 继续塞</text>
  </g>

  <g transform="translate(40,449)">
    <rect width="540" height="44" rx="4" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#fbbf24">🧠 AIMessage</text>
    <text x="14" y="34" font-size="11" fill="#cbd5e1" font-style="italic">"让我读一下这些结果..." (但已被淹没)</text>
  </g>

  <!-- Bad outcome -->
  <g transform="translate(40,510)">
    <rect width="540" height="160" rx="8" fill="url(#badGrad)" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#fde047">💥 后果</text>
    <text x="20" y="56" font-size="12" fill="#fca5a5">• Token 成本 <tspan font-weight="700" fill="#fde047">飙升 10×</tspan> —— 每轮都重读 13000+ 字</text>
    <text x="20" y="78" font-size="12" fill="#fca5a5">• <tspan font-weight="700" fill="#fde047">context rot</tspan> —— LLM 在长内容里抓不住重点</text>
    <text x="20" y="100" font-size="12" fill="#fca5a5">• 延迟变慢、响应失焦</text>
    <text x="20" y="122" font-size="12" fill="#fca5a5">• <tspan font-weight="700" fill="#fde047">逼近上下文上限</tspan>,后续步骤可能截断</text>
    <text x="20" y="146" font-size="11" fill="#fecaca" font-style="italic">→ 这就是「治挤」要解决的病</text>
  </g>

  <!-- ===== RIGHT: WITH files ===== -->
  <g transform="translate(620,100)">
    <rect width="540" height="60" rx="8" fill="url(#goodGrad)" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#fde047">✅ 用 Files —— context 精炼</text>
    <text x="270" y="48" text-anchor="middle" font-size="11" fill="#bbf7d0" font-style="italic">长内容落盘到 state.files,context 只留文件名</text>
  </g>

  <!-- Messages compact -->
  <g transform="translate(620,180)">
    <text x="20" y="0" font-size="12" font-weight="700" fill="#fbbf24">📦 state["messages"](精简)</text>
  </g>

  <g transform="translate(620,195)">
    <rect width="540" height="44" rx="4" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#f1f5f9">🧑 HumanMessage</text>
    <text x="14" y="34" font-size="11" fill="#cbd5e1">"研究 MCP 协议,给我一份综述"</text>
  </g>

  <g transform="translate(620,245)">
    <rect width="540" height="44" rx="4" fill="#1a2e1f" stroke="#4ade80" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#fbbf24">🔧 ToolMessage: write_file("mcp_intro.md")</text>
    <text x="14" y="34" font-size="11" fill="#bbf7d0">"Updated file mcp_intro.md"  ← 只一行</text>
  </g>

  <g transform="translate(620,295)">
    <rect width="540" height="44" rx="4" fill="#1a2e1f" stroke="#4ade80" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#fbbf24">🔧 ToolMessage: write_file("mcp_history.md")</text>
    <text x="14" y="34" font-size="11" fill="#bbf7d0">"Updated file mcp_history.md"</text>
  </g>

  <g transform="translate(620,345)">
    <rect width="540" height="44" rx="4" fill="#1a2e1f" stroke="#4ade80" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#fbbf24">🔧 ToolMessage: write_file("mcp_usecases.md")</text>
    <text x="14" y="34" font-size="11" fill="#bbf7d0">"Updated file mcp_usecases.md"</text>
  </g>

  <g transform="translate(620,395)">
    <rect width="540" height="44" rx="4" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#fbbf24">🧠 AIMessage</text>
    <text x="14" y="34" font-size="11" fill="#cbd5e1" font-style="italic">"用 read_file 取需要的那段就行"</text>
  </g>

  <!-- state.files panel below -->
  <g transform="translate(620,455)">
    <rect width="540" height="120" rx="8" fill="#0f2729" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">📦 state.files(虚拟文件系统)</text>
    <text x="20" y="50" font-size="11" fill="#a5f3fc">"mcp_intro.md":    &lt;4800 字 全文&gt;</text>
    <text x="20" y="70" font-size="11" fill="#a5f3fc">"mcp_history.md":  &lt;3200 字 全文&gt;</text>
    <text x="20" y="90" font-size="11" fill="#a5f3fc">"mcp_usecases.md": &lt;5400 字 全文&gt;</text>
    <text x="20" y="110" font-size="11" fill="#67e8f9" font-style="italic">完整内容仍在 state 里,只是 <tspan font-weight="700">不在 messages 里</tspan></text>
  </g>

  <!-- Arrow showing read on demand -->
  <line x1="700" y1="395" x2="700" y2="450" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrCyan)"/>
  <text x="715" y="425" font-size="11" fill="#67e8f9" font-style="italic">read_file 按需取</text>

  <!-- Good outcome -->
  <g transform="translate(620,590)">
    <rect width="540" height="80" rx="8" fill="url(#goodGrad)" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#fde047">🎉 收益</text>
    <text x="20" y="52" font-size="12" fill="#bbf7d0">• Context 长度 <tspan font-weight="700" fill="#fbbf24">下降 10×</tspan>  ·  Token 成本同步下降</text>
    <text x="20" y="70" font-size="12" fill="#bbf7d0">• 完整内容仍可 <tspan font-weight="700" fill="#fbbf24">read_file / edit_file</tspan> 按需访问</text>
  </g>

  <!-- ===== BOTTOM: tools + reducer ===== -->
  <g transform="translate(40,700)">
    <rect width="1120" height="180" rx="10" fill="#14141c" stroke="#475569" stroke-width="1.5"/>
    <text x="560" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">🛠️ 四件套 + 关键机制</text>

    <!-- 4 tools -->
    <g transform="translate(40,52)">
      <rect width="240" height="100" rx="6" fill="#0f2729" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">📁 文件工具</text>
      <text x="14" y="44" font-size="11" fill="#a5f3fc"><tspan font-weight="700">ls()</tspan> — 列出文件名</text>
      <text x="14" y="62" font-size="11" fill="#a5f3fc"><tspan font-weight="700">read_file(path, offset, limit)</tspan></text>
      <text x="14" y="80" font-size="11" fill="#a5f3fc"><tspan font-weight="700">write_file(path, content)</tspan></text>
      <text x="14" y="96" font-size="11" fill="#a5f3fc"><tspan font-weight="700">edit_file(path, old, new)</tspan></text>
    </g>

    <g transform="translate(300,52)">
      <rect width="400" height="100" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
      <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">📦 数据结构(State)</text>
      <text x="14" y="44" font-size="11" fill="#e2e8f0">DeepAgentState 扩展 AgentState:</text>
      <text x="14" y="62" font-size="11" fill="#e2e8f0">  • messages: List[BaseMessage]  &lt;= 原有</text>
      <text x="14" y="80" font-size="11" fill="#e2e8f0">  • todos: List[Todo]            &lt;= lesson 1</text>
      <text x="14" y="98" font-size="11" fill="#fbbf24" font-weight="700">  • files: Annotated[dict, file_reducer]</text>
    </g>

    <g transform="translate(720,52)">
      <rect width="360" height="100" rx="6" fill="#2a2418" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#f9a8d4">🔄 file_reducer 机制</text>
      <text x="14" y="44" font-size="11" fill="#fde68a">两次 write_file 不会相互覆盖整个 dict:</text>
      <text x="14" y="62" font-size="11" fill="#fde68a"><tspan font-weight="700">{a:1} ⊕ {b:2} = {a:1, b:2}</tspan></text>
      <text x="14" y="80" font-size="11" fill="#fde68a">而 messages 默认是 add reducer(append)</text>
      <text x="14" y="98" font-size="11" fill="#f9a8d4" font-style="italic">→ Annotated[type, reducer_fn] 是关键</text>
    </g>
  </g>
</svg>
