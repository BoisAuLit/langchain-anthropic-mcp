<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1780" height="498" viewBox="0 0 1780 498">
  <rect width="1780" height="498" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#222" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .mono{font-family:'Courier New', Courier, monospace; fill:#222; font-weight:700;}
      .hand{font-family:'Comic Sans MS','Bradley Hand','Courier New',monospace; fill:#111; font-weight:600;}
      .small{font-size:20px;}
      .tiny{font-size:16px;}
      .label{font-size:28px;}
      .right{font-size:28px;}
      .title{font-size:31px;}
    </style>
  </defs>
  <text x="122.36" y="65.64" class="mono label" style="white-space: pre; font-size: 28px;">Graph</text>
  <text x="29" y="164" class="mono label" style="white-space: pre;">Super-steps</text>
  <text x="29" y="299" class="mono label" style="white-space: pre;">Checkpoints</text>
  <text x="106" y="437" class="mono label" style="white-space: pre;">Thread</text>
  <text x="235" y="64" class="hand small" style="white-space: pre;">{state: “I”}</text>
  <line x1="357" y1="60" x2="431" y2="60" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="479" y="19" class="hand tiny" style="white-space: pre;">Node 1</text>
  <circle cx="508" cy="60" r="18" fill="#ffc2c6" stroke="#222" stroke-width="2"/>
  <line x1="578" y1="60" x2="653" y2="60" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="749" y="22" class="hand tiny" style="white-space: pre;">Node 2</text>
  <circle cx="774" cy="60" r="18" fill="#9ed0f3" stroke="#222" stroke-width="2"/>
  <line x1="828" y1="60" x2="904" y2="60" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="918.44" y="63.979" class="hand small" style="white-space: pre; font-size: 20px;">{state: “I heart langgraph”}</text>
  <circle cx="508" cy="153" r="18" fill="#ffc2c6" stroke="#222" stroke-width="2"/>
  <circle cx="774" cy="153" r="18" fill="#9ed0f3" stroke="#222" stroke-width="2"/>
  <rect x="416" y="234" width="168" height="106" rx="20" fill="#ffc2c6" stroke="#222" stroke-width="2"/>
  <text x="439" y="260" class="hand tiny" style="white-space: pre;">state: “I heart”</text>
  <text x="439" y="282" class="hand tiny" style="white-space: pre;">next: node 2</text>
  <text x="439" y="303" class="hand tiny" style="white-space: pre;">id: ...</text>
  <text x="439" y="324" class="hand tiny" style="white-space: pre;">etc ...</text>
  <rect x="651" y="234" width="257" height="90" rx="20" fill="#9ed0f3" stroke="#222" stroke-width="2"/>
  <text x="671" y="255" class="hand tiny" style="white-space: pre;">state: “I heart langgraph”</text>
  <text x="671" y="277" class="hand tiny" style="white-space: pre;">next: end</text>
  <text x="671" y="298" class="hand tiny" style="white-space: pre;">id: ...</text>
  <text x="671" y="318" class="hand tiny" style="white-space: pre;">etc ...</text>
  <rect x="401" y="374" width="448" height="111" rx="22" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="9 8"/>
  <rect x="465" y="405" width="80" height="42" rx="9" fill="#ffc2c6" stroke="#222" stroke-width="2"/>
  <rect x="691" y="404" width="91" height="49" rx="10" fill="#9ed0f3" stroke="#222" stroke-width="2"/>
  <text x="1219.25" y="61.875" class="mono title" style="white-space: pre; font-size: 31px;">Control flow of nodes, edges</text>
  <text x="1196" y="132" class="mono right" style="white-space: pre;">Each sequential node is a separate</text>
  <text x="1196" y="164" class="mono right" style="white-space: pre;">super-step, while parallel nodes</text>
  <text x="1196" y="196" class="mono right" style="white-space: pre;">share the same super-step</text>
  <text x="1196" y="266" class="mono right" style="white-space: pre;">State and relevant metadata packaged</text>
  <text x="1196" y="298" class="mono right" style="white-space: pre;">at every super-step</text>
  <text x="1196" y="440" class="mono right" style="white-space: pre;">Collection of checkpoints</text>
</svg>