<svg xmlns="http://www.w3.org/2000/svg" width="525" height="374" viewBox="0 0 525 374">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#d7d0f4" flood-opacity="0.25"/>
    </filter>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:600;fill:#234547}
      .label{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:700;fill:#2d5253}
      .small{font-family:Inter,Arial,sans-serif;font-size:9px;font-weight:700;fill:#345a5b}
      .panel{fill:#e8e3ff}
      .card{fill:#fbfaff}
      .green{fill:#153f3b}
      .line{stroke:#ffffff;stroke-width:2;opacity:.85}
      .dash{fill:#fbfaff;stroke:#c9b9e9;stroke-width:1.2;stroke-dasharray:3 3}
      .iconStroke{stroke:#ffffff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .tealStroke{stroke:#3d6968;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
  </defs>

  <rect x="18" y="6" width="489" height="361" rx="9" class="panel"/>

  <text x="31" y="42" class="title">Open Source Frameworks</text>

  <rect x="31" y="60" width="462" height="50" rx="5" class="card" filter="url(#softShadow)"/>
  <g transform="translate(45 72)">
    <rect width="51" height="26" rx="13" class="green"/>
    <!-- LangChain icon: simple parrot + link -->
    <path d="M12 15c3-8 9-8 13 0l-5-1 1 5c-4-.5-7-2-9-4z" fill="#fff" opacity=".95"/>
    <path d="M15 8c4 1 7 4 9 8" class="iconStroke"/>
    <path d="M13 10l3 0" class="iconStroke"/>
    <path d="M31 12c2.2-2.2 5.7-2.2 7.8 0 2.2 2.2 2.2 5.7 0 7.8l-3.1 3.1c-2.2 2.2-5.7 2.2-7.8 0" class="iconStroke" opacity=".9"/>
    <path d="M35 17l-8 8" class="iconStroke" opacity=".9"/>
    <path d="M37 15c-2.2-2.2-5.7-2.2-7.8 0l-3.1 3.1" class="iconStroke" opacity=".9"/>
  </g>
  <text x="106" y="90" class="label">LangChain</text>

  <rect x="31" y="119" width="462" height="50" rx="5" class="card" filter="url(#softShadow)"/>
  <g transform="translate(45 131)">
    <rect width="51" height="26" rx="13" class="green"/>
    <!-- LangGraph icon: parrot + node graph -->
    <path d="M12 15c3-8 9-8 13 0l-5-1 1 5c-4-.5-7-2-9-4z" fill="#fff" opacity=".95"/>
    <path d="M15 8c4 1 7 4 9 8" class="iconStroke"/>
    <circle cx="34" cy="9" r="2.4" fill="#fff"/>
    <circle cx="42" cy="17" r="2.4" fill="#fff"/>
    <circle cx="32" cy="20" r="2.4" fill="#fff"/>
    <path d="M36 11l4 4M40 18l-6 1M34 12l-2 6" class="iconStroke" opacity=".9"/>
  </g>
  <text x="106" y="149" class="label">LangGraph</text>

  <line x1="31" y1="185" x2="493" y2="185" class="line"/>

  <text x="31" y="225" class="title">Agent Engineering Platform</text>

  <rect x="31" y="247" width="462" height="104" rx="5" class="card" filter="url(#softShadow)"/>
  <g transform="translate(45 259)">
    <rect width="51" height="26" rx="13" class="green"/>
    <!-- LangSmith icon: parrot + crossed tools -->
    <path d="M12 15c3-8 9-8 13 0l-5-1 1 5c-4-.5-7-2-9-4z" fill="#fff" opacity=".95"/>
    <path d="M15 8c4 1 7 4 9 8" class="iconStroke"/>
    <path d="M31 7l12 12M43 7L31 19" class="iconStroke" opacity=".95"/>
    <path d="M30 6l4 0 0 4M44 6l-4 0 0 4" class="iconStroke" opacity=".95"/>
  </g>
  <text x="106" y="277" class="label">LangSmith</text>

  <rect x="45" y="297" width="141" height="44" rx="3" class="dash"/>
  <rect x="192" y="297" width="141" height="44" rx="3" class="dash"/>
  <rect x="339" y="297" width="141" height="44" rx="3" class="dash"/>

  <g transform="translate(59 314)">
    <path d="M0 5c3-4.5 11.5-4.5 15 0-3.5 4.5-12 4.5-15 0z" class="tealStroke"/>
    <circle cx="7.5" cy="5" r="2.1" fill="#3d6968"/>
  </g>
  <text x="82" y="322" class="small">Observability</text>

  <g transform="translate(207 311)">
    <path d="M2 14V2M7 14V7M12 14V4M17 14V10" class="tealStroke"/>
    <path d="M0 15h20" class="tealStroke"/>
  </g>
  <text x="230" y="322" class="small">Evaluation</text>

  <g transform="translate(356 310)">
    <path d="M7 1l7 4v8l-7 4-7-4V5z" fill="#3d6968"/>
    <path d="M7 1v7M7 8l7-3M7 8L0 5" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity=".9"/>
  </g>
  <text x="379" y="322" class="small">Deployment</text>
</svg>
