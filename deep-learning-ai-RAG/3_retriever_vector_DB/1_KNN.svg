<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 800" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="aro" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f5a623"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="1500" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="70" font-size="52" font-weight="800" fill="#111">Basic Vector Retrieval - KNN</text>

  <!-- ===================== 3D AXES + DOTS ===================== -->
  <g transform="translate(60,120)">
    <!-- floor diamond -->
    <path d="M40 540 L370 660 L760 540 L370 420 Z" fill="none" stroke="#a0a8b5" stroke-width="2" stroke-dasharray="6 6"/>

    <!-- axes -->
    <line x1="370" y1="540" x2="370" y2="20"  stroke="#1a2438" stroke-width="3"/>
    <polygon points="370,20 360,40 380,40" fill="#1a2438"/>

    <line x1="370" y1="540" x2="60"  y2="660" stroke="#1a2438" stroke-width="3"/>
    <polygon points="60,660 76,652 76,668" fill="#1a2438"/>

    <line x1="370" y1="540" x2="730" y2="660" stroke="#1a2438" stroke-width="3"/>
    <polygon points="730,660 714,652 714,668" fill="#1a2438"/>

    <!-- Center: prompt vector (yellow) - placed at intersection (370, 280) -->
    <!-- All dashed connecting lines first -->
    <g stroke="#1a2438" stroke-width="2" stroke-dasharray="7 5">
      <!-- far navy dots -->
      <line x1="370" y1="280" x2="140" y2="160"/>
      <line x1="370" y1="280" x2="60"  y2="240"/>
      <line x1="370" y1="280" x2="60"  y2="330"/>
      <line x1="370" y1="280" x2="80"  y2="390"/>
      <line x1="370" y1="280" x2="170" y2="470"/>
      <line x1="370" y1="280" x2="270" y2="510"/>
      <line x1="370" y1="280" x2="430" y2="510"/>
      <line x1="370" y1="280" x2="520" y2="200"/>
      <line x1="370" y1="280" x2="650" y2="280"/>
      <line x1="370" y1="280" x2="710" y2="340"/>
      <line x1="370" y1="280" x2="640" y2="400"/>
    </g>

    <!-- close red dots -->
    <g stroke="#1a2438" stroke-width="2" stroke-dasharray="7 5">
      <line x1="370" y1="280" x2="270" y2="220"/>
      <line x1="370" y1="280" x2="320" y2="380"/>
      <line x1="370" y1="280" x2="430" y2="240"/>
      <line x1="370" y1="280" x2="230" y2="380"/>
      <line x1="370" y1="280" x2="200" y2="430"/>
    </g>

    <!-- navy outer document dots -->
    <g fill="#2c3a52">
      <circle cx="140" cy="160" r="12"/>
      <circle cx="60"  cy="240" r="12"/>
      <circle cx="60"  cy="330" r="12"/>
      <circle cx="80"  cy="390" r="12"/>
      <circle cx="170" cy="470" r="12"/>
      <circle cx="270" cy="510" r="12"/>
      <circle cx="430" cy="510" r="12"/>
      <circle cx="520" cy="200" r="12"/>
      <circle cx="650" cy="280" r="12"/>
      <circle cx="710" cy="340" r="12"/>
      <circle cx="640" cy="400" r="12"/>
    </g>

    <!-- red close-neighbor dots -->
    <g fill="#ef5b6b">
      <circle cx="270" cy="220" r="12"/>
      <circle cx="320" cy="380" r="12"/>
      <circle cx="430" cy="240" r="12"/>
      <circle cx="230" cy="380" r="12"/>
      <circle cx="200" cy="430" r="12"/>
    </g>

    <!-- Prompt vector yellow dot -->
    <circle cx="370" cy="280" r="16" fill="#f5a623" stroke="#ffffff" stroke-width="3"/>

    <!-- Prompt vector label + arrow -->
    <text x="350" y="80" font-size="22" fill="#f5a623" font-weight="700">Prompt vector</text>
    <path d="M450 95 C 460 160, 420 230, 380 270" fill="none" stroke="#f5a623" stroke-width="3" marker-end="url(#aro)"/>
  </g>

  <!-- ===================== RIGHT PANEL ===================== -->
  <rect x="860" y="120" width="600" height="600" rx="22" fill="#f1f3f5"/>

  <text x="900" y="190" font-size="28" fill="#111"><tspan font-weight="800">KNN:</tspan><tspan> K Nearest Neighbors</tspan></text>

  <!-- bullet 1 -->
  <circle cx="920" cy="280" r="7" fill="#111"/>
  <text x="950" y="282" font-size="26" fill="#111">
    <tspan font-weight="800">Vectorize</tspan><tspan> all documents and</tspan>
  </text>
  <text x="950" y="320" font-size="26" fill="#111">prompt</text>

  <!-- bullet 2 -->
  <circle cx="920" cy="410" r="7" fill="#111"/>
  <text x="950" y="412" font-size="26" fill="#111">
    <tspan font-weight="800">Compute</tspan><tspan> distances to all</tspan>
  </text>
  <text x="950" y="450" font-size="26" fill="#111">document vectors</text>

  <!-- bullet 3 -->
  <circle cx="920" cy="525" r="7" fill="#111"/>
  <text x="950" y="527" font-size="26" fill="#111">
    <tspan font-weight="800">Sort</tspan><tspan> by distance</tspan>
  </text>

  <!-- bullet 4 -->
  <circle cx="920" cy="615" r="7" fill="#111"/>
  <text x="950" y="617" font-size="26" fill="#111">
    <tspan font-weight="800">Return</tspan><tspan> closest elements</tspan>
  </text>
</svg>
