<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- White background -->
  <rect x="0" y="0" width="1400" height="700" fill="#ffffff"/>

  <!-- Outer light-gray rounded panel -->
  <rect x="20" y="20" width="1360" height="660" rx="20" fill="#f1f3f5"/>

  <!-- ===================== SECTION 1: TERM FREQUENCY SATURATION ===================== -->
  <circle cx="65" cy="75" r="22" fill="#ef5b6b"/>
  <text x="65" y="84" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">1</text>

  <text x="110" y="84" font-size="28" font-weight="800" fill="#111">Term Frequency Saturation</text>

  <!-- Left: TF-IDF X badge -->
  <circle cx="115" cy="180" r="40" fill="#1a1a1a"/>
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round">
    <line x1="100" y1="165" x2="130" y2="195"/>
    <line x1="130" y1="165" x2="100" y2="195"/>
  </g>
  <text x="115" y="255" text-anchor="middle" font-size="22" font-weight="800" fill="#111">TF-IDF</text>

  <text x="195" y="170" font-size="26" fill="#111">
    <tspan font-weight="800">"pizza" 10 times</tspan><tspan>  = Score X</tspan>
  </text>
  <text x="195" y="208" font-size="26" fill="#111">
    <tspan font-weight="800">"pizza" 20 times</tspan><tspan> = Score 2X</tspan>
  </text>

  <!-- Right: BM25 check badge -->
  <circle cx="800" cy="180" r="40" fill="#7bc4d4"/>
  <path d="M783 182 L795 194 L820 167" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="800" y="255" text-anchor="middle" font-size="22" font-weight="800" fill="#111">BM25</text>

  <text x="870" y="170" font-size="26" fill="#111">
    <tspan font-weight="800">"pizza" 10 times</tspan><tspan>  = Score X</tspan>
  </text>
  <text x="870" y="208" font-size="26" fill="#111">
    <tspan font-weight="800">"pizza" 20 times</tspan><tspan> = </tspan>
  </text>
  <!-- pink highlight on Score 1.3X -->
  <rect x="1180" y="184" width="158" height="34" rx="4" fill="#fcd2d6"/>
  <text x="1188" y="208" font-size="26" fill="#111">Score 1.3X</text>

  <!-- Teal badge "Term Frequency Saturation" -->
  <rect x="870" y="245" width="450" height="42" rx="6" fill="#9bd0e0"/>
  <text x="1095" y="274" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="22" fill="#111">Term Frequency Saturation</text>

  <!-- Dashed divider -->
  <line x1="60" y1="340" x2="1340" y2="340" stroke="#b9b1e0" stroke-width="2" stroke-dasharray="8 8"/>

  <!-- ===================== SECTION 2: DOCUMENT LENGTH NORMALIZATION ===================== -->
  <circle cx="65" cy="395" r="22" fill="#ef5b6b"/>
  <text x="65" y="404" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">2</text>

  <text x="110" y="404" font-size="28" font-weight="800" fill="#111">Document Length Normalization</text>

  <!-- Left: TF-IDF X badge -->
  <circle cx="115" cy="475" r="40" fill="#1a1a1a"/>
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round">
    <line x1="100" y1="460" x2="130" y2="490"/>
    <line x1="130" y1="460" x2="100" y2="490"/>
  </g>
  <text x="115" y="550" text-anchor="middle" font-size="22" font-weight="800" fill="#111">TF-IDF</text>

  <text x="195" y="467" font-size="26" fill="#111">
    <tspan font-weight="800">Short Doc</tspan><tspan>  = Good Score</tspan>
  </text>
  <text x="195" y="505" font-size="26" fill="#111">
    <tspan font-weight="800">Long Doc</tspan><tspan>   = Heavy Penalty</tspan>
  </text>

  <!-- Orange "Too aggressive" badge -->
  <rect x="195" y="540" width="320" height="44" rx="6" fill="#f7c98a"/>
  <text x="355" y="571" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="22" fill="#111">Too aggressive</text>

  <!-- Right: BM25 check badge -->
  <circle cx="800" cy="475" r="40" fill="#7bc4d4"/>
  <path d="M783 477 L795 489 L820 462" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="800" y="550" text-anchor="middle" font-size="22" font-weight="800" fill="#111">BM25</text>

  <text x="870" y="467" font-size="26" fill="#111">
    <tspan font-weight="800">Short Doc</tspan><tspan>  = Good Score</tspan>
  </text>
  <text x="870" y="505" font-size="26" fill="#111">
    <tspan font-weight="800">Long Doc</tspan><tspan>   = </tspan>
  </text>
  <!-- pink highlight on Smaller Penalty -->
  <rect x="1078" y="481" width="240" height="34" rx="4" fill="#fcd2d6"/>
  <text x="1086" y="505" font-size="26" fill="#111">Smaller Penalty</text>

  <!-- Teal badge "Document length normalization" -->
  <rect x="870" y="535" width="450" height="80" rx="6" fill="#9bd0e0"/>
  <text x="1095" y="568" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="22" fill="#111">Document length</text>
  <text x="1095" y="598" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="22" fill="#111">normalization</text>
</svg>
