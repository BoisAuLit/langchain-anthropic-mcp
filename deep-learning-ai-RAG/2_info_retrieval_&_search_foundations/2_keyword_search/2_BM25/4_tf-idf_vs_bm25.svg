<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- White background -->
  <rect x="0" y="0" width="1400" height="650" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="70" font-size="44" fill="#111">TF-IDF vs BM25</text>

  <!-- ============ FACTORY ICON (left) ============ -->
  <g transform="translate(120,140)" fill="none" stroke="#111" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
    <!-- left smokestack -->
    <path d="M55 0 L55 130 L95 130 L95 0 Z"/>
    <!-- right smokestack (taller? actually shorter in image) -->
    <path d="M175 40 L175 150 L215 150 L215 40 Z"/>
    <!-- main factory body with zig-zag roof -->
    <path d="M0 290
             L0 150
             L95 150
             L95 200
             L175 150
             L175 230
             L255 150
             L335 230
             L335 290
             Z" stroke-linejoin="miter"/>
    <!-- windows row -->
    <rect x="35"  y="225" width="40" height="35"/>
    <rect x="105" y="225" width="40" height="35"/>
    <rect x="175" y="225" width="40" height="35"/>
    <rect x="245" y="225" width="40" height="35"/>
  </g>

  <!-- ============ NAVY TEXT BOX (right) ============ -->
  <rect x="580" y="140" width="760" height="290" rx="20" fill="#2c3a52"/>

  <text x="615" y="270" font-size="30" fill="#ffffff">
    <tspan font-weight="800">BM25</tspan><tspan> = Standard keyword search</tspan>
  </text>
  <text x="615" y="320" font-size="30" fill="#ffffff">algorithm in production retrievers</text>

  <!-- ============ BOTTOM TAGLINE ============ -->
  <text x="700" y="540" text-anchor="middle" font-size="32" fill="#111">
    <tspan font-weight="800">better performance</tspan><tspan> + </tspan><tspan font-weight="800">same cost</tspan><tspan> + </tspan><tspan font-weight="800">more flexibility</tspan>
  </text>
  <text x="700" y="585" text-anchor="middle" font-size="30" fill="#111">than TF-IDF</text>
</svg>
