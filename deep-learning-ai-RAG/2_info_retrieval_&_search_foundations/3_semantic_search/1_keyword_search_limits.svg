<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 760" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- White background -->
  <rect x="0" y="0" width="1300" height="760" fill="#ffffff"/>

  <!-- ============ TOP GRAY CALLOUT ============ -->
  <rect x="40" y="30" width="1220" height="120" rx="14" fill="#eef0f2"/>
  <text x="70" y="80" font-size="30" fill="#111">In order to improve on lexical search it's necessary to capture not only the</text>
  <text x="70" y="120" font-size="30" fill="#111">
    <tspan>presence of words, but their </tspan><tspan font-weight="800">meaning.</tspan>
  </text>

  <!-- ============ BOX 1: Cannot match synonyms ============ -->
  <rect x="340" y="190" width="700" height="270" rx="22" fill="#fcc6cc"/>
  <text x="690" y="235" text-anchor="middle" font-size="28" font-weight="800" fill="#111">Cannot match synonyms</text>

  <!-- "happy" tile -->
  <rect x="395" y="270" width="200" height="160" rx="14" fill="#fdf1f0"/>
  <text x="495" y="365" text-anchor="middle" font-size="30" fill="#111">&#8220;happy&#8221;</text>

  <!-- "glad" tile -->
  <rect x="785" y="270" width="200" height="160" rx="14" fill="#fdf1f0"/>
  <text x="885" y="365" text-anchor="middle" font-size="30" fill="#111">&#8220;glad&#8221;</text>

  <!-- ============ BOX 2: Incorrectly matches different meanings ============ -->
  <rect x="340" y="490" width="700" height="270" rx="22" fill="#fcc6cc"/>
  <text x="690" y="535" text-anchor="middle" font-size="28" font-weight="800" fill="#111">Incorrectly matches different meanings</text>

  <!-- Python logo tile -->
  <rect x="395" y="570" width="200" height="160" rx="14" fill="#fdf1f0"/>
  <g transform="translate(450,600)">
    <!-- Python logo two interlocking rounded shapes -->
    <path d="M45 0
             C 30 0 22 8 22 22
             L 22 38
             L 65 38
             L 65 44
             L 12 44
             C 5 44 0 50 0 60
             L 0 78
             C 0 88 5 94 12 94
             L 28 94
             L 28 76
             C 28 70 32 66 38 66
             L 70 66
             C 80 66 86 60 86 50
             L 86 22
             C 86 8 78 0 64 0 Z"
          fill="#111"/>
    <path d="M61 100
             C 76 100 84 92 84 78
             L 84 62
             L 41 62
             L 41 56
             L 94 56
             C 101 56 106 50 106 40
             L 106 22
             C 106 12 101 6 94 6
             L 78 6
             L 78 24
             C 78 30 74 34 68 34
             L 36 34
             C 26 34 20 40 20 50
             L 20 78
             C 20 92 28 100 42 100 Z"
          fill="#111"/>
    <circle cx="36" cy="12" r="4" fill="#fdf1f0"/>
    <circle cx="70" cy="88" r="4" fill="#fdf1f0"/>
  </g>

  <!-- Snake tile -->
  <rect x="785" y="570" width="200" height="160" rx="14" fill="#fdf1f0"/>
  <g transform="translate(820,595)" fill="#111">
    <!-- coiled snake body -->
    <path d="M65 0
             C 90 0 110 18 110 40
             C 110 55 100 65 88 65
             C 80 65 75 60 75 53
             C 75 48 78 44 84 44
             L 96 44
             C 92 36 84 30 75 30
             C 62 30 52 40 52 53
             L 52 70
             C 52 80 60 88 70 88
             L 110 88
             C 122 88 130 96 130 108
             L 130 110
             L 14 110
             C 24 95 32 88 44 82
             C 30 78 18 70 12 60
             C 28 65 38 65 48 62
             C 38 52 32 38 32 24
             C 32 12 42 0 56 0 Z"/>
    <!-- eye -->
    <circle cx="96" cy="20" r="3" fill="#fdf1f0"/>
    <!-- tongue -->
    <path d="M112 22 L122 18 L120 22 L124 26 L112 24 Z" fill="#111"/>
    <!-- body texture lines -->
    <path d="M30 100 Q 60 92 90 100" fill="none" stroke="#fdf1f0" stroke-width="2"/>
    <path d="M50 78 Q 70 72 90 78" fill="none" stroke="#fdf1f0" stroke-width="2"/>
  </g>
</svg>
