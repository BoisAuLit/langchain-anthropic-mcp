<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 950" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="darr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a2438"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="1700" height="950" fill="#ffffff"/>

  <!-- ===================== ROW 1: INDIVIDUAL WORDS ===================== -->
  <rect x="40" y="30" width="540" height="200" rx="18" fill="#f1f3f5"/>
  <text x="70" y="80" font-size="30" font-weight="800" fill="#111">Individual Words</text>

  <!-- cat pill -->
  <rect x="85" y="115" width="170" height="70" rx="35" fill="#ef5b6b"/>
  <text x="170" y="160" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">cat</text>

  <!-- happy pill -->
  <rect x="275" y="115" width="200" height="70" rx="35" fill="#ef5b6b"/>
  <text x="375" y="160" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">happy</text>

  <!-- dashed arrow -->
  <path d="M590 130 Q 700 130, 780 130" fill="none" stroke="#1a2438" stroke-width="4" stroke-dasharray="14 10" marker-end="url(#darr)"/>

  <!-- Word Embedding Model -->
  <rect x="800" y="40" width="280" height="200" rx="16" fill="#ef5b6b"/>
  <text x="940" y="120" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Word</text>
  <text x="940" y="160" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Embedding</text>
  <text x="940" y="200" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Model</text>

  <!-- dashed arrow -->
  <path d="M1090 130 Q 1200 130, 1300 130" fill="none" stroke="#1a2438" stroke-width="4" stroke-dasharray="14 10" marker-end="url(#darr)"/>

  <!-- 3D axes row 1 -->
  <g transform="translate(1380,30)">
    <!-- floor diamond -->
    <path d="M40 200 L130 240 L220 200 L130 160 Z" fill="none" stroke="#a0a8b5" stroke-width="2" stroke-dasharray="4 4"/>
    <!-- axes -->
    <line x1="130" y1="240" x2="40" y2="200" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <line x1="130" y1="240" x2="220" y2="200" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <line x1="130" y1="240" x2="130" y2="20" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <!-- gray scattered dots -->
    <g fill="#c9ccd1">
      <circle cx="80"  cy="80"  r="5"/>
      <circle cx="170" cy="60"  r="5"/>
      <circle cx="105" cy="120" r="5"/>
      <circle cx="200" cy="110" r="5"/>
      <circle cx="75"  cy="180" r="5"/>
      <circle cx="170" cy="190" r="5"/>
      <circle cx="220" cy="160" r="5"/>
      <circle cx="60"  cy="140" r="5"/>
      <circle cx="155" cy="135" r="5"/>
    </g>
    <!-- red highlighted dots -->
    <circle cx="195" cy="80" r="6" fill="#ef5b6b"/>
    <circle cx="115" cy="95" r="6" fill="#ef5b6b"/>
  </g>

  <!-- ===================== ROW 2: SENTENCES ===================== -->
  <rect x="40" y="270" width="540" height="340" rx="18" fill="#f1f3f5"/>
  <text x="70" y="320" font-size="30" font-weight="800" fill="#111">Sentences</text>

  <rect x="85" y="360" width="430" height="76" rx="14" fill="#1eb6c8"/>
  <text x="300" y="410" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">The weather is nice</text>

  <rect x="85" y="475" width="430" height="76" rx="14" fill="#1eb6c8"/>
  <text x="300" y="525" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">What a lovely day</text>

  <!-- dashed arrow -->
  <path d="M590 440 Q 700 440, 780 440" fill="none" stroke="#1a2438" stroke-width="4" stroke-dasharray="14 10" marker-end="url(#darr)"/>

  <!-- Sentence Embedding Model -->
  <rect x="800" y="350" width="280" height="200" rx="16" fill="#1eb6c8"/>
  <text x="940" y="430" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Sentence</text>
  <text x="940" y="470" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Embedding</text>
  <text x="940" y="510" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Model</text>

  <!-- dashed arrow -->
  <path d="M1090 440 Q 1200 440, 1300 440" fill="none" stroke="#1a2438" stroke-width="4" stroke-dasharray="14 10" marker-end="url(#darr)"/>

  <!-- 3D axes row 2 -->
  <g transform="translate(1380,340)">
    <path d="M40 200 L130 240 L220 200 L130 160 Z" fill="none" stroke="#a0a8b5" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="130" y1="240" x2="40" y2="200" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <line x1="130" y1="240" x2="220" y2="200" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <line x1="130" y1="240" x2="130" y2="20" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <g fill="#c9ccd1">
      <circle cx="80"  cy="100" r="5"/>
      <circle cx="105" cy="135" r="5"/>
      <circle cx="160" cy="120" r="5"/>
      <circle cx="200" cy="135" r="5"/>
      <circle cx="60"  cy="170" r="5"/>
      <circle cx="170" cy="200" r="5"/>
      <circle cx="220" cy="170" r="5"/>
      <circle cx="120" cy="200" r="5"/>
      <circle cx="90"  cy="55"  r="5"/>
    </g>
    <!-- teal pair (close together) -->
    <circle cx="180" cy="80" r="6" fill="#1eb6c8"/>
    <circle cx="200" cy="92" r="6" fill="#1eb6c8"/>
  </g>

  <!-- ===================== ROW 3: DOCUMENTS ===================== -->
  <rect x="40" y="650" width="540" height="270" rx="18" fill="#f1f3f5"/>
  <text x="70" y="700" font-size="30" font-weight="800" fill="#111">Documents</text>

  <!-- Document stack 1 -->
  <g transform="translate(110,730)">
    <rect x="20" y="20" width="100" height="130" rx="10" fill="#1a2438"/>
    <line x1="40" y1="50" x2="100" y2="50" stroke="#ffffff" stroke-width="4"/>
    <line x1="40" y1="70" x2="100" y2="70" stroke="#ffffff" stroke-width="4"/>
    <line x1="40" y1="90" x2="80" y2="90" stroke="#ffffff" stroke-width="4"/>
    <rect x="0"  y="0"  width="100" height="130" rx="10" fill="#2c3a52"/>
    <line x1="20" y1="30" x2="80" y2="30" stroke="#ffffff" stroke-width="4"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#ffffff" stroke-width="4"/>
    <line x1="20" y1="70" x2="60" y2="70" stroke="#ffffff" stroke-width="4"/>
  </g>

  <!-- Document stack 2 -->
  <g transform="translate(310,730)">
    <rect x="20" y="20" width="100" height="130" rx="10" fill="#1a2438"/>
    <line x1="40" y1="50" x2="100" y2="50" stroke="#ffffff" stroke-width="4"/>
    <line x1="40" y1="70" x2="100" y2="70" stroke="#ffffff" stroke-width="4"/>
    <line x1="40" y1="90" x2="80" y2="90" stroke="#ffffff" stroke-width="4"/>
    <rect x="0"  y="0"  width="100" height="130" rx="10" fill="#2c3a52"/>
    <line x1="20" y1="30" x2="80" y2="30" stroke="#ffffff" stroke-width="4"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#ffffff" stroke-width="4"/>
    <line x1="20" y1="70" x2="60" y2="70" stroke="#ffffff" stroke-width="4"/>
  </g>

  <!-- dashed arrow -->
  <path d="M590 800 Q 700 800, 780 800" fill="none" stroke="#1a2438" stroke-width="4" stroke-dasharray="14 10" marker-end="url(#darr)"/>

  <!-- Document Embedding Model -->
  <rect x="800" y="700" width="280" height="200" rx="16" fill="#2c3a52"/>
  <text x="940" y="780" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Document</text>
  <text x="940" y="820" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Embedding</text>
  <text x="940" y="860" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">Model</text>

  <!-- dashed arrow -->
  <path d="M1090 800 Q 1200 800, 1300 800" fill="none" stroke="#1a2438" stroke-width="4" stroke-dasharray="14 10" marker-end="url(#darr)"/>

  <!-- 3D axes row 3 -->
  <g transform="translate(1380,690)">
    <path d="M40 200 L130 240 L220 200 L130 160 Z" fill="none" stroke="#a0a8b5" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="130" y1="240" x2="40" y2="200" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <line x1="130" y1="240" x2="220" y2="200" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <line x1="130" y1="240" x2="130" y2="20" stroke="#1a2438" stroke-width="3" marker-end="url(#darr)"/>
    <g fill="#c9ccd1">
      <circle cx="80"  cy="100" r="5"/>
      <circle cx="170" cy="80"  r="5"/>
      <circle cx="105" cy="135" r="5"/>
      <circle cx="200" cy="115" r="5"/>
      <circle cx="60"  cy="170" r="5"/>
      <circle cx="170" cy="195" r="5"/>
      <circle cx="100" cy="195" r="5"/>
      <circle cx="155" cy="155" r="5"/>
      <circle cx="90"  cy="55"  r="5"/>
    </g>
    <!-- navy pair -->
    <circle cx="60"  cy="195" r="6" fill="#1a2438"/>
    <circle cx="200" cy="195" r="6" fill="#1a2438"/>
  </g>
</svg>
