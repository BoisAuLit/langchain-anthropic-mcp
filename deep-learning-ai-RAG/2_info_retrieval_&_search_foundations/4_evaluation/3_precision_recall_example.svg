<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- White background -->
  <rect x="0" y="0" width="1500" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="70" font-size="50" font-weight="800" fill="#111">Example</text>

  <!-- ===================== KNOWLEDGE BASE (left) ===================== -->
  <g transform="translate(60,140)">
    <rect width="130" height="130" rx="22" fill="#2c3a52"/>
    <!-- back cylinder -->
    <g transform="translate(24,28)">
      <ellipse cx="22" cy="6" rx="22" ry="6" fill="#ffffff"/>
      <rect x="0" y="6" width="44" height="26" fill="#ffffff"/>
      <ellipse cx="22" cy="32" rx="22" ry="6" fill="#ffffff"/>
      <ellipse cx="22" cy="6" rx="22" ry="6" fill="none" stroke="#2c3a52" stroke-width="1.5"/>
      <ellipse cx="22" cy="19" rx="22" ry="6" fill="none" stroke="#2c3a52" stroke-width="1.5"/>
    </g>
    <!-- front cylinder -->
    <g transform="translate(58,52)">
      <ellipse cx="22" cy="6" rx="22" ry="6" fill="#ffffff"/>
      <rect x="0" y="6" width="44" height="34" fill="#ffffff"/>
      <ellipse cx="22" cy="40" rx="22" ry="6" fill="#ffffff"/>
      <ellipse cx="22" cy="6" rx="22" ry="6" fill="none" stroke="#2c3a52" stroke-width="1.5"/>
      <ellipse cx="22" cy="19" rx="22" ry="6" fill="none" stroke="#2c3a52" stroke-width="1.5"/>
      <ellipse cx="22" cy="32" rx="22" ry="6" fill="none" stroke="#2c3a52" stroke-width="1.5"/>
    </g>
  </g>
  <text x="125" y="310" text-anchor="middle" font-size="24" fill="#111"><tspan font-weight="800">10 Relevant</tspan></text>
  <text x="125" y="340" text-anchor="middle" font-size="24" fill="#111"><tspan font-weight="800">Documents</tspan> in</text>
  <text x="125" y="370" text-anchor="middle" font-size="24" fill="#111">Knowledge</text>
  <text x="125" y="400" text-anchor="middle" font-size="24" fill="#111">Base</text>

  <!-- ===================== FIRST RUN ===================== -->
  <!-- circular arrow icon (pencil inside) -->
  <g transform="translate(310,140)" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round">
    <path d="M50 10 A 40 40 0 1 1 10 50" />
    <polyline points="50,4 50,16 60,10" stroke-linejoin="round"/>
    <path d="M10 50 A 40 40 0 1 0 50 90"/>
    <polyline points="10,82 10,94 0,88" stroke-linejoin="round"/>
    <!-- pencil -->
    <line x1="30" y1="60" x2="55" y2="35" stroke-width="3"/>
    <polygon points="55,35 60,30 65,35 60,40" fill="#111"/>
    <line x1="28" y1="62" x2="33" y2="67" stroke-width="3"/>
  </g>
  <text x="430" y="180" font-size="36" font-weight="800" fill="#111">First Run</text>
  <text x="430" y="225" font-size="26" fill="#111">Retrieved: 12 Documents</text>
  <text x="430" y="262" font-size="26" fill="#111">Relevant:  8  Documents</text>

  <!-- Precision row -->
  <text x="370" y="350" font-size="26" fill="#111"><tspan font-weight="800">Precision</tspan> (8/12)</text>
  <rect x="600" y="324" width="180" height="42" rx="6" fill="#e8ecf0"/>
  <text x="690" y="354" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">66%</text>

  <!-- Recall row -->
  <text x="370" y="450" font-size="26" fill="#111"><tspan font-weight="800">Recall</tspan>      (8/10)</text>
  <rect x="600" y="424" width="180" height="42" rx="6" fill="#e8ecf0"/>
  <text x="690" y="454" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">80%</text>

  <!-- ===================== SECOND RUN ===================== -->
  <g transform="translate(870,140)" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round">
    <path d="M50 10 A 40 40 0 1 1 10 50" />
    <polyline points="50,4 50,16 60,10" stroke-linejoin="round"/>
    <path d="M10 50 A 40 40 0 1 0 50 90"/>
    <polyline points="10,82 10,94 0,88" stroke-linejoin="round"/>
    <line x1="30" y1="60" x2="55" y2="35" stroke-width="3"/>
    <polygon points="55,35 60,30 65,35 60,40" fill="#111"/>
    <line x1="28" y1="62" x2="33" y2="67" stroke-width="3"/>
  </g>
  <text x="990" y="180" font-size="36" font-weight="800" fill="#111">Second Run</text>
  <text x="990" y="225" font-size="26" fill="#111">Retrieved: 15 Documents</text>
  <text x="990" y="262" font-size="26" fill="#111">Relevant:  9  Documents</text>

  <!-- Precision row (red pill, down arrow) -->
  <text x="930" y="350" font-size="26" fill="#111"><tspan font-weight="800">Precision</tspan> (9/15)</text>
  <rect x="1190" y="324" width="180" height="42" rx="6" fill="#ef9aa3"/>
  <text x="1280" y="354" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">60%</text>
  <line x1="1395" y1="328" x2="1395" y2="362" stroke="#111" stroke-width="2.5"/>
  <polygon points="1395,366 1389,358 1401,358" fill="#111"/>

  <!-- Recall row (green pill, up arrow) -->
  <text x="930" y="450" font-size="26" fill="#111"><tspan font-weight="800">Recall</tspan>      (9/10)</text>
  <rect x="1190" y="424" width="180" height="42" rx="6" fill="#a8d8a8"/>
  <text x="1280" y="454" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">90%</text>
  <line x1="1395" y1="428" x2="1395" y2="462" stroke="#111" stroke-width="2.5"/>
  <polygon points="1395,424 1389,432 1401,432" fill="#111"/>

  <!-- ===================== BOTTOM TAKEAWAYS ===================== -->
  <text x="60" y="560" font-size="28" fill="#111">
    <tspan font-weight="800">Precision</tspan><tspan> penalizes for </tspan><tspan font-weight="800">returning irrelevant</tspan><tspan> documents</tspan>
  </text>

  <text x="60" y="635" font-size="28" fill="#111">
    <tspan font-weight="800">Recall</tspan><tspan> penalizes for </tspan><tspan font-weight="800">leaving out relevant</tspan><tspan> documents</tspan>
  </text>

  <text x="60" y="710" font-size="28" fill="#111">
    <tspan font-weight="800">100% Precision &amp; Recall:</tspan><tspan> Rank relevant documents most highly and only return those</tspan>
  </text>
</svg>
