<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 800" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- White background -->
  <rect x="0" y="0" width="1500" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="70" font-size="50" font-weight="800" fill="#111">Mean Reciprocal Rank</text>

  <!-- ===================== LEFT SEARCH ROWS ===================== -->
  <!-- Search 1 -->
  <text x="100" y="160" text-anchor="middle" font-size="22" fill="#222">Search</text>
  <text x="100" y="188" text-anchor="middle" font-size="22" fill="#222">1</text>
  <text x="200" y="180" font-size="28" font-weight="800" fill="#111">First relevant at rank 1</text>
  <rect x="660" y="148" width="120" height="60" rx="14" fill="#e8ecf0"/>
  <text x="720" y="188" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">1.0</text>

  <!-- Search 2 -->
  <text x="100" y="330" text-anchor="middle" font-size="22" fill="#222">Search</text>
  <text x="100" y="358" text-anchor="middle" font-size="22" fill="#222">2</text>
  <text x="200" y="348" font-size="28" font-weight="800" fill="#111">First relevant at rank 3</text>
  <rect x="660" y="316" width="120" height="60" rx="14" fill="#e8ecf0"/>
  <text x="720" y="356" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">0.33</text>

  <!-- Search 3 -->
  <text x="100" y="500" text-anchor="middle" font-size="22" fill="#222">Search</text>
  <text x="100" y="528" text-anchor="middle" font-size="22" fill="#222">3</text>
  <text x="200" y="518" font-size="28" font-weight="800" fill="#111">First relevant at rank 6</text>
  <rect x="660" y="486" width="120" height="60" rx="14" fill="#e8ecf0"/>
  <text x="720" y="526" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">0.17</text>

  <!-- Search 4 -->
  <text x="100" y="670" text-anchor="middle" font-size="22" fill="#222">Search</text>
  <text x="100" y="698" text-anchor="middle" font-size="22" fill="#222">4</text>
  <text x="200" y="688" font-size="28" font-weight="800" fill="#111">First relevant at rank 2</text>
  <rect x="660" y="656" width="120" height="60" rx="14" fill="#e8ecf0"/>
  <text x="720" y="696" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">0.5</text>

  <!-- ===================== RIGHT PANEL ===================== -->
  <rect x="830" y="120" width="640" height="620" rx="22" fill="#f1f3f5"/>

  <!-- Step 1 -->
  <circle cx="880" cy="220" r="24" fill="#ef5b6b"/>
  <text x="880" y="230" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">1</text>
  <text x="930" y="232" font-size="32" font-weight="800" fill="#111">Sum all ranks</text>

  <text x="900" y="320" font-family="'Courier New', Courier, monospace" font-size="26" fill="#111">1.0 + 0.33 + 0.17 + 0.5 = 2.0</text>

  <!-- Step 2 -->
  <circle cx="880" cy="475" r="24" fill="#ef5b6b"/>
  <text x="880" y="485" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">2</text>
  <text x="930" y="478" font-size="30" font-weight="800" fill="#111">Divide by number of</text>
  <text x="930" y="518" font-size="30" font-weight="800" fill="#111">searches</text>

  <text x="1080" y="580" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="28" fill="#111">2.0 / 4</text>
  <text x="1080" y="650" text-anchor="middle" font-size="34" font-weight="800" fill="#111">MRR = 0.5</text>
</svg>
