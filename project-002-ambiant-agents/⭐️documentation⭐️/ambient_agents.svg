<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <rect width="100%" height="100%" fill="white"/>

  <text x="900" y="85" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="48" font-weight="700" fill="#555555">
    “Ambient Agents”
  </text>

  <g transform="translate(55,315)">
    <rect x="0" y="0" width="1690" height="460" fill="white" stroke="#bfbfbf" stroke-width="3"/>

    <line x1="520" y1="0" x2="520" y2="460" stroke="#bfbfbf" stroke-width="3"/>
    <line x1="1100" y1="0" x2="1100" y2="460" stroke="#bfbfbf" stroke-width="3"/>

    <line x1="0" y1="95" x2="1690" y2="95" stroke="#bfbfbf" stroke-width="3"/>
    <line x1="0" y1="187" x2="1690" y2="187" stroke="#bfbfbf" stroke-width="3"/>
    <line x1="0" y1="280" x2="1690" y2="280" stroke="#bfbfbf" stroke-width="3"/>
    <line x1="0" y1="372" x2="1690" y2="372" stroke="#bfbfbf" stroke-width="3"/>

    <text x="545" y="63" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#000000">Chat Agents</text>
    <text x="1125" y="63" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#000000">Ambient agents</text>

    <text x="22" y="157" font-family="Arial, Helvetica, sans-serif" font-size="41" font-weight="700" fill="#000000">Agent Trigger</text>
    <text x="22" y="250" font-family="Arial, Helvetica, sans-serif" font-size="41" font-weight="700" fill="#000000">Concurrency</text>
    <text x="22" y="343" font-family="Arial, Helvetica, sans-serif" font-size="41" font-weight="700" fill="#000000">UX</text>
    <text x="22" y="435" font-family="Arial, Helvetica, sans-serif" font-size="41" font-weight="700" fill="#000000">Latency Requirements</text>

    <text x="545" y="157" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">User message / request</text>
    <text x="545" y="250" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">~1 user request</text>
    <text x="545" y="343" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">Chat UI / await completion</text>
    <text x="545" y="435" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">Needs to be fast</text>

    <text x="1125" y="157" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">Listening to events</text>
    <text x="1125" y="250" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">Many events</text>
    <text x="1125" y="343" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">Background / notify me</text>
    <text x="1125" y="435" font-family="Arial, Helvetica, sans-serif" font-size="41" fill="#000000">Can take longer</text>
  </g>
</svg>
